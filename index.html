<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUB Quebec — Pipeline Tracker</title>
<style>
  :root {
    --hub-classic-blue: #263746;
    --hub-electric-blue: #0678D5;
    --hub-arctic-gray: #E3E3E3;
    --hub-gold: #F3B921;
    --hub-green: #3EBD3E;
    --hub-shocking-blue: #00AEEF;
    --hub-red: #AC1534;
    --hub-gray: #757584;
    --bg: #0d1926;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --text-primary: #f0f4ff;
    --text-secondary: #8899bb;
    --text-muted: #4a6080;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Gotham', Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(6,120,213,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 90% 90%, rgba(38,55,70,0.4) 0%, transparent 70%);
    pointer-events:none; z-index:0;
  }
  .page { position:relative; z-index:1; max-width:1440px; margin:0 auto; padding:32px 28px; }

  /* ── HEADER ── */
  header {
    display:flex; justify-content:space-between; align-items:center;
    padding-bottom:24px; margin-bottom:32px;
    border-bottom:1px solid var(--card-border);
  }
  .header-left { display:flex; align-items:center; gap:16px; }
  .hub-logo-img { height:42px; }
  .header-center { text-align:center; }
  .header-center h1 {
    font-size:22px; font-weight:700; letter-spacing:-0.5px;
    color:var(--text-primary);
  }
  .header-center .subtitle {
    font-size:11px; color:var(--text-secondary); letter-spacing:1px;
    text-transform:uppercase; margin-top:2px;
  }
  .header-right { text-align:right; }
  .header-right .name {
    font-size:14px; font-weight:600; color:var(--text-primary);
  }
  .header-right .role {
    font-size:10px; color:var(--text-secondary); letter-spacing:0.5px;
    text-transform:uppercase; margin-top:2px;
  }

  /* ── KPI CARDS ── */
  .kpi-grid {
    display:grid; grid-template-columns:repeat(5,1fr); gap:14px;
    margin-bottom:28px;
  }
  .kpi-card {
    background: var(--glass);
    border:1px solid var(--glass-border);
    border-radius:12px; padding:18px 16px;
    backdrop-filter:blur(12px);
    transition:transform 0.2s, border-color 0.2s;
  }
  .kpi-card:hover { transform:translateY(-2px); border-color:rgba(255,255,255,0.2); }
  .kpi-label {
    font-size:10px; font-weight:700; letter-spacing:1px;
    text-transform:uppercase; color:var(--text-secondary); margin-bottom:8px;
  }
  .kpi-value {
    font-size:28px; font-weight:700; letter-spacing:-1px; line-height:1;
  }
  .kpi-sub { font-size:10px; color:var(--text-muted); margin-top:6px; }
  .kpi-accent { color:var(--hub-electric-blue); }
  .gold { color:var(--hub-gold); }
  .green { color:var(--hub-green); }
  .light { color:var(--hub-shocking-blue); }
  .aum-color { color:var(--hub-shocking-blue); }

  /* ── TIMELINE ── */
  .section-header {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px; margin-top:8px;
  }
  .section-title {
    font-size:14px; font-weight:700; letter-spacing:0.3px;
    color:var(--text-primary);
  }
  .section-title span { font-size:10px; color:var(--text-muted); margin-left:8px; }
  .timeline-grid {
    display:grid; grid-template-columns:repeat(6,1fr); gap:10px;
    margin-bottom:28px;
  }
  .month-card {
    background:var(--glass); border:1px solid var(--glass-border);
    border-radius:10px; padding:14px 12px; text-align:center;
    backdrop-filter:blur(8px);
  }
  .month-label { font-size:10px; font-weight:700; color:var(--text-secondary); letter-spacing:0.5px; text-transform:uppercase; }
  .month-count { font-size:24px; font-weight:700; color:var(--hub-electric-blue); margin:6px 0 4px; }
  .month-premium { font-size:9px; color:var(--text-muted); }

  /* ── CONTROLS ── */
  .controls { display:flex; gap:8px; align-items:center; }
  .search-input {
    background:var(--glass); border:1px solid var(--glass-border);
    border-radius:6px; padding:6px 12px; color:var(--text-primary);
    font-size:12px; width:180px; outline:none;
    font-family:inherit;
  }
  .search-input::placeholder { color:var(--text-muted); }
  .search-input:focus { border-color:var(--hub-electric-blue); }
  .filter-btn {
    background:transparent; border:1px solid var(--glass-border);
    border-radius:6px; padding:5px 12px; color:var(--text-secondary);
    font-size:10px; font-weight:600; cursor:pointer;
    letter-spacing:0.3px; transition:all 0.2s; font-family:inherit;
  }
  .filter-btn:hover { border-color:var(--hub-electric-blue); color:var(--text-primary); }
  .filter-btn.active {
    background:var(--hub-electric-blue); border-color:var(--hub-electric-blue);
    color:#fff;
  }

  /* ── TABLE ── */
  .table-wrap {
    background:var(--glass); border:1px solid var(--glass-border);
    border-radius:12px; overflow:hidden; backdrop-filter:blur(12px);
  }
  table { width:100%; border-collapse:collapse; }
  th {
    text-align:left; padding:12px 14px; font-size:10px; font-weight:700;
    letter-spacing:0.8px; text-transform:uppercase;
    color:var(--text-secondary); border-bottom:1px solid var(--card-border);
    cursor:pointer; user-select:none; white-space:nowrap;
  }
  th:hover { color:var(--hub-electric-blue); }
  td {
    padding:10px 14px; font-size:12px; border-bottom:1px solid rgba(255,255,255,0.04);
  }
  tr:hover { background:rgba(255,255,255,0.03); }
  .client-name { font-weight:600; color:var(--text-primary); white-space:nowrap; }
  .premium { font-weight:700; color:var(--hub-gold); font-size:13px; }
  .premium.large { color:var(--hub-gold); font-size:14px; }
  .aum-tag {
    font-size:8px; font-weight:700; color:var(--hub-shocking-blue);
    letter-spacing:1px; margin-left:4px; vertical-align:middle;
  }
  .commission { color:var(--hub-green); font-weight:600; }
  .close-date { font-size:11px; color:var(--text-secondary); white-space:nowrap; }
  .close-date.urgent { color:#ff6b6b; font-weight:600; }
  .close-date.soon { color:var(--hub-gold); }
  .priority-indicator { display:flex; align-items:center; gap:7px; font-size:10px; font-weight:700; letter-spacing:0.3px; color:var(--text-secondary); }
  .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .dot-high { background:var(--hub-electric-blue); box-shadow:0 0 6px rgba(6,120,213,0.7); }
  .dot-mid { background:var(--hub-gold); }
  .dot-low { background:var(--text-muted); }
  .stage-badge {
    font-size:8px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase;
    padding:2px 7px; border-radius:3px; white-space:nowrap;
  }
  .stage-discover { background:rgba(6,120,213,0.15); color:var(--hub-electric-blue); border:1px solid rgba(6,120,213,0.25); }

  /* ── FOOTER ── */
  .footer {
    text-align:center; padding:20px 0 8px; margin-top:24px;
    border-top:1px solid var(--card-border);
  }
  .footer-text { font-size:9px; color:var(--text-muted); letter-spacing:0.5px; }

  /* ── RESPONSIVE ── */
  @media(max-width:960px){
    .kpi-grid { grid-template-columns:repeat(3,1fr); }
    .timeline-grid { grid-template-columns:repeat(3,1fr); }
    h1 { font-size:18px; }
    .page { padding:20px 16px; }
  }
  @media(max-width:600px){
    .kpi-grid { grid-template-columns:repeat(2,1fr); }
    .timeline-grid { grid-template-columns:repeat(2,1fr); }
    header { flex-direction:column; gap:12px; text-align:center; }
    .header-right { text-align:center; }
  }
</style>
</head>

  {client:"Leyton Canada",                                          topic:"Retirement",premium:100000,  commission:10000, close:"2026-04-01"},

  {client:"RACOR en santé mental",                                  topic:"EB",        premium:300000,  commission:30000, close:"2026-05-01"},
  {client:"MICROBRASSERIE LE PROSPECTEUR INC.",                     topic:"EB",        premium:150000,  commission:15000, close:"2026-05-01"},
  {client:"AtmanCo Inc.",                                           topic:"EB",        premium:40000,   commission:4000,  close:"2026-05-01"},
  {client:"Grandir Ensemble",                                       topic:"Retirement",premium:2000000, commission:5000,  close:"2026-05-01"},

  {client:"TKM Group",                                              topic:"EB",        premium:200000,  commission:20000, close:"2026-06-01"},
  {client:"Le Regroupement Loisir et Sport du Québec",              topic:"EB",        premium:2000000, commission:100000,close:"2026-07-01"},
  {client:"Cinesite Montreal",                                      topic:"EB",        premium:1000000, commission:80000, close:"2026-07-01"},
  {client:"Lamour",                                                 topic:"EB",        premium:1000000, commission:50000, close:"2026-08-01"},
  {client:"NXT Generation",                                         topic:"EB",        premium:100000,  commission:10000, close:"2026-08-01"},
  {client:"DECASULT",                                               topic:"EB",        premium:300000,  commission:30000, close:"2026-11-01"},
  {client:"CEIQ",                                                   topic:"EB",        premium:5000000, commission:150000,close:"2026-11-01"},
  {client:"AQPP (Assoc. Québécoise des Pharmaciens Propriétaires)", topic:"EB",        premium:500000,  commission:50000, close:"2027-01-01"},

  {client:"Renaissance",                                            topic:"EB",        premium:5000000, commission:100000,close:"2027-01-01"},
];

let topicFilter='all', sortKey='close', sortDir=1;

// ─── HELPERS ───
const fmt = v => v>=1000000 ? '$'+((v/1000000).toFixed(v%1000000===0?0:1))+'M'
              : v>=1000    ? '$'+Math.round(v/1000)+'K'
              : '$'+v.toLocaleString();

const priority = p => p>=2000000 ? {lvl:1,dot:'dot-high',label:'High'}
                    : p>=300000  ? {lvl:2,dot:'dot-mid', label:'Mid'}
                    :              {lvl:3,dot:'dot-low', label:'Std'};

const dateClass = ds => {
  const d=(new Date(ds)-new Date())/86400000;
  return d<46?'urgent':d<91?'soon':'';
};
const fmtDate = ds => new Date(ds).toLocaleDateString('en-CA',{year:'numeric',month:'short',day:'numeric'});

// ─── Live Date ───
document.getElementById('liveDate').textContent =
  new Date().toLocaleDateString('en-CA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

// ─── KPIs ───
function buildKPIs(){
  const total = DATA.length;
  const ebPremium = DATA.filter(r=>r.topic!=='Retirement').reduce((s,r)=>s+r.premium,0);
  const aumPremium = DATA.filter(r=>r.topic==='Retirement').reduce((s,r)=>s+r.premium,0);
  const totalCommission = DATA.reduce((s,r)=>s+r.commission,0);
  const now = new Date();
  const closing60 = DATA.filter(r=>{
    const d=(new Date(r.close)-now)/86400000;
    return d>=0 && d<=60;
  }).length;

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Total Opportunities</div>
      <div class="kpi-value kpi-accent">${total}</div>
      <div class="kpi-sub">Active pipeline</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Est. Premium (EB)</div>
      <div class="kpi-value gold">${fmt(ebPremium)}</div>
      <div class="kpi-sub">Insurance premium only</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Est. AUM (Retirement)</div>
      <div class="kpi-value aum-color">${fmt(aumPremium)}</div>
      <div class="kpi-sub">Retirement accounts</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Est. Commission</div>
      <div class="kpi-value green">${fmt(totalCommission)}</div>
      <div class="kpi-sub">Total estimated revenue</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Closing ≤ 60 Days</div>
      <div class="kpi-value light">${closing60}</div>
      <div class="kpi-sub">Upcoming closes</div>
    </div>`;
}

// ─── TIMELINE ───
function buildTimeline(){
  const months = {};
  DATA.forEach(r=>{
    const d = new Date(r.close);
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    if(!months[key]) months[key]={count:0,premium:0,label:d.toLocaleDateString('en-CA',{month:'short',year:'numeric'})};
    months[key].count++;
    months[key].premium+=r.premium;
  });
  const sorted = Object.entries(months).sort((a,b)=>a[0].localeCompare(b[0]));
  document.getElementById('timelineGrid').innerHTML = sorted.map(([,m])=>`
    <div class="month-card">
      <div class="month-label">${m.label}</div>
      <div class="month-count">${m.count}</div>
      <div class="month-premium">${fmt(m.premium)} premium</div>
    </div>`).join('');
}

// ─── TABLE ───
function getRows(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  return DATA
    .filter(r=>topicFilter==='all'||(topicFilter==='EB'?r.topic!=='Retirement':r.topic==='Retirement'))
    .filter(r=>!q||r.client.toLowerCase().includes(q))
    .sort((a,b)=>{
      let av,bv;
      if(sortKey==='client'){av=a.client;bv=b.client;}
      else if(sortKey==='premium'){av=a.premium;bv=b.premium;}
      else if(sortKey==='commission'){av=a.commission;bv=b.commission;}
      else if(sortKey==='close'){av=a.close;bv=b.close;}
      else{av=priority(a.premium).lvl;bv=priority(b.premium).lvl;}
      return av<bv?-sortDir:av>bv?sortDir:0;
    });
}

function render(){
  const rows=getRows();
  document.getElementById('rowCount').textContent=rows.length+' record'+(rows.length!==1?'s':'');
  const tb=document.getElementById('tableBody');
  tb.innerHTML='';
  rows.forEach(r=>{
    const p=priority(r.premium);
    const isRetirement = r.topic==='Retirement';
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><div class="priority-indicator"><span class="dot ${p.dot}"></span>${p.label}</div></td>
      <td><div class="client-name">${r.client}</div></td>
      <td><span class="premium${r.premium>=2000000?' large':''}">${fmt(r.premium)}${isRetirement?'<span class="aum-tag">AUM</span>':''}</span></td>
      <td><span class="commission">${fmt(r.commission)}</span></td>
      <td><span class="close-date ${dateClass(r.close)}">${fmtDate(r.close)}</span></td>`;
    tb.appendChild(tr);
  });
}

function setFilter(t,btn){
  topicFilter=t;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function sortBy(k){
  sortDir=sortKey===k?-sortDir:1; sortKey=k; render();
}

// ─── Init ───
buildKPIs();
buildTimeline();
render();
</script>

</html>
